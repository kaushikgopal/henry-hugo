<div class="archive-row flex items-baseline gap-4 mb-2">
  <!-- Date column: fixed width, muted -->
  <span
    class="archive-date flex-shrink-0 w-[4.5rem] text-sm text-ht-lighter relative"
  >
    {{ if eq .Type "shorts" }}
    <!-- Bubble SVG sits behind the date text for shorts -->
    <svg
      class="absolute -left-3 top-1/2 -translate-y-1/2 w-7 h-7 text-ht-lighter opacity-25 pointer-events-none"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path
        d="M21 11.5a8.38 8.38 0 0 1-1.9 5.4A8.5 8.5 0 0 1 12 21a8.38 8.38 0 0 1-5.4-1.9L3 21l1.9-5.4A8.38 8.38 0 0 1 3 11.5 8.5 8.5 0 1 1 21 11.5z"
      ></path>
    </svg>
    {{ end }} {{ .Date.Format "2006-01" }}
  </span>

  <!-- Title column -->
  <h1 class="post-link-url font-title font-semibold leading-tight">
    {{ if .Draft }}<span class="draft pill-hc2-solid text-xs mr-1">Draft</span
    >{{ end }}
    <a
      class="no-underline {{ if .Params.externalLink }}external-link{{ end }}"
      href="{{ .RelPermalink }}"
    >
      {{ if eq .Section "log" }} {{ .Date.Format "January 2006" }} {{ else if eq
      .Type "shorts" }} {{ partial "get-first-paragraph-ellipsised.html"
      .Content }} {{ else }} {{ .Title }} {{ end }}
    </a>
  </h1>
</div>
